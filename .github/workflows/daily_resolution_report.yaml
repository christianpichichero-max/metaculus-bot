name: Daily resolution report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *" # daily 12:00 UTC (8am Nassau)

permissions:
  contents: write
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pull accumulated logs from data branch
        run: |
          git fetch origin data || { echo "no data branch yet"; exit 0; }
          mkdir -p data
          git show origin/data:forecasts.jsonl > data/forecasts.jsonl 2>/dev/null || true
          git show origin/data:supervisor.jsonl > data/supervisor.jsonl 2>/dev/null || true
      - name: Run resolution + shadow-A/B report
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
        run: |
          python resolve.py | tee report.txt
      - name: Publish report (and raise the news flag on first/new resolutions)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          COUNT=$(grep -oE "RESOLVED binary: [0-9]+" report.txt | grep -oE "[0-9]+" || echo 0)
          LAST=$(git show origin/data:last_reported_count 2>/dev/null || echo 0)
          echo "resolved now: $COUNT | last reported: $LAST"
          REPO="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config --global user.email "bot@users.noreply.github.com"
          git config --global user.name "chrispbacon-bot"
          D="$(mktemp -d)"
          git clone --quiet --depth 1 --branch data "$REPO" "$D"
          cp report.txt "$D/report.txt"
          [ -f data/resolved.jsonl ] && cp data/resolved.jsonl "$D/resolved.jsonl"
          if [ "$COUNT" -gt "$LAST" ]; then
            echo "$COUNT" > "$D/last_reported_count"
            printf "date: %s\nresolved: %s (was %s)\n" "$(date -u +%FT%TZ)" "$COUNT" "$LAST" > "$D/NEWS.md"
            cat report.txt >> "$D/NEWS.md"
            gh issue create \
              --title "📊 Chrispbacon-bot: $COUNT resolved question(s) — new scores are in" \
              --body "@christianpichichero-max first/new resolutions just landed. Report:

\`\`\`
$(cat report.txt)
\`\`\`

Leaderboard: https://www.metaculus.com/tournament/summer-futureeval-2026/ · Profile: https://www.metaculus.com/accounts/profile/303904/" \
              --repo "$GITHUB_REPOSITORY" || echo "issue creation failed (non-fatal)"
          fi
          ( cd "$D" && git add -A && git commit --quiet -m "daily report $(date -u +%FT%TZ)" && git push --quiet origin data ) || echo "nothing to commit"
