name: Forecast on new AI tournament questions

on:
  workflow_dispatch:
  schedule:
    - cron: "7,27,47 * * * *" # every 20 min, offset off the hour. skip_previously_forecasted_questions=True handles dedupe.

# Prevent overlapping runs (a run can outlast the 20-min cadence).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  forecast_job:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run bot (MiniBench only — cheap bridge until free credits land)
        run: python main.py --mode minibench
        # Secrets live under Settings → Secrets and variables → Actions.
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASKNEWS_CLIENT_ID: ${{ secrets.ASKNEWS_CLIENT_ID }}
          ASKNEWS_SECRET: ${{ secrets.ASKNEWS_SECRET }}
      # Persist this run's forecast log so we can review calibration over time.
      - name: Upload forecast log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecasts-${{ github.run_id }}
          path: data/forecasts.jsonl
          if-no-files-found: ignore
