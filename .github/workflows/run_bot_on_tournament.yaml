name: Forecast on new AI tournament questions

on:
  workflow_dispatch:
  schedule:
    - cron: "7,27,47 * * * *" # every 20 min, offset off the hour. skip_previously_forecasted_questions=True handles dedupe.

# Needs write access to push the accumulating forecast log to the 'data' branch.
permissions:
  contents: write

# Prevent overlapping runs (a run can outlast the 20-min cadence).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  forecast_job:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run bot (seasonal FutureEval + MiniBench — free on OpenRouter credits)
        run: python main.py
        # Secrets live under Settings → Secrets and variables → Actions.
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASKNEWS_CLIENT_ID: ${{ secrets.ASKNEWS_CLIENT_ID }}
          ASKNEWS_SECRET: ${{ secrets.ASKNEWS_SECRET }}
      # THE CALIBRATION FLYWHEEL: append this run's logs to the durable 'data' branch
      # (the one real edge). Per-file loop: an empty forecasts.jsonl must NOT skip a
      # non-empty supervisor.jsonl. Push retries with a fresh clone handle races with
      # the daily-report workflow pushing the same branch.
      - name: Persist run logs to 'data' branch
        if: always()
        run: |
          set +e
          FILES="forecasts.jsonl supervisor.jsonl draws.jsonl failed.jsonl"
          ANY=0
          for f in $FILES; do [ -s "data/$f" ] && ANY=1; done
          if [ "$ANY" = "0" ]; then echo "no new log lines this run — nothing to persist"; exit 0; fi
          REPO="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git config --global user.email "bot@users.noreply.github.com"
          git config --global user.name "chrispbacon-bot"
          for attempt in 1 2 3; do
            D="$(mktemp -d)"
            if git clone --quiet --depth 1 --branch data "$REPO" "$D" 2>/dev/null; then
              for f in $FILES; do
                [ -s "data/$f" ] && cat "data/$f" >> "$D/$f"
              done
              if ( cd "$D" && git add -A && git commit --quiet -m "run logs $(date -u +%FT%TZ)" && git push --quiet origin data ); then
                echo "appended to data branch (attempt $attempt)"; exit 0
              fi
              echo "push rejected (attempt $attempt) — likely concurrent writer; re-cloning..."
              sleep $((attempt * 5))
            else
              cd "$D"
              git init --quiet && git checkout --quiet -b data
              for f in $FILES; do
                [ -s "$GITHUB_WORKSPACE/data/$f" ] && cp "$GITHUB_WORKSPACE/data/$f" "$f"
              done
              git add -A && git commit --quiet -m "init logs $(date -u +%FT%TZ)"
              git push --quiet "$REPO" data && { echo "created data branch"; exit 0; }
              sleep $((attempt * 5))
            fi
          done
          echo "::warning::data-branch persist FAILED after 3 attempts — logs only in artifact"
      # Belt-and-suspenders: also keep the per-run artifact (all logs).
      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecasts-${{ github.run_id }}
          path: |
            data/forecasts.jsonl
            data/supervisor.jsonl
            data/draws.jsonl
            data/failed.jsonl
          if-no-files-found: ignore
